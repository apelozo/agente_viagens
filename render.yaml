# Blueprint Render: API (Node) + site Flutter Web estático.
# 1) Liga este repositório no Render (Blueprint) ou cria os dois serviços manualmente com os mesmos valores.
# 2) Preenche os segredos no painel (DATABASE_URL do Neon, JWT_SECRET, etc.).
# 3) O Static Site precisa de API_BASE_URL = URL pública do backend (https, sem barra final).

services:
  - type: web
    name: app-viagens-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false

  - type: web
    name: app-viagens-web
    runtime: static
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: bash scripts/render-build-web.sh
    staticPublishPath: ./build/web
    envVars:
      - key: API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
